<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Ducati 848</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Ducati 848</h1>
  </header>

  <main>

    <!-- メイン画像 -->
    <section>
      <img src="img/848.jpg" alt="Ducati 848" class="bike-main">
    </section>

    <!-- 説明 -->
    <section>
      <h2>概要</h2>
      <p>
        Ducati 848はスーパーバイクシリーズのミドルクラスモデル。
        軽量で扱いやすく、それでいてドゥカティらしい刺激的な加速が魅力。
      </p>
    </section>

    <!-- スペック -->
    <section>
      <h2>スペック</h2>
      <table>
        <tr><th>排気量</th><td>849cc</td></tr>
        <tr><th>エンジン</th><td>Lツイン</td></tr>
        <tr><th>最高出力</th><td>約134hp</td></tr>
        <tr><th>車重</th><td>約168kg（乾燥）</td></tr>
        <tr><th>最高速</th><td>約260km/h</td></tr>
      </table>
    </section>

    <!-- 特徴 -->
    <section>
      <h2>特徴</h2>
      <ul>
        <li>乾式クラッチ（※848EVOは湿式）</li>
        <li>トレリスフレーム</li>
        <li>美しいイタリアンデザイン</li>
      </ul>
    </section>

  </main>

</body>
</html>
